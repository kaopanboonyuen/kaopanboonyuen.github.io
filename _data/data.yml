career-profile:
    title: Career Profile
    summary: |
      Hi there. My name is **Teerapong Panboonyuen** (now, I am 29), also known as **Kao Panboonyuen** (or just **Kao**) and received the Ph.D. degree in Computer Engineering (Artificial Intelligence, Machine Learning, Deep Learning) from Chulalongkorn University (Bangkok, Thailand).

      In 2015, I graduated with a B.Eng. in Computer Engineering from KMUTNB.

      In 2016, I graduated with a M.Eng. in Computer Engineering from Chulalongkorn University.

      In 2020, I graduated with a Ph.D. in Computer Engineering from Chulalongkorn University as well.

      In 2021, I was AI Research Scientist at CJExpress Group and accepted the position of Postdoctoral Fellowship at Chula.

      In 2022, I'm currently working at MARS (Motor AI Recognition Solution) as a Senior AI Engineer and still being PostDoc at Chula.

      My primary interests are in practical deep learning and computer vision (especially on remote sensing corpus). I’ll be distilling my own learnings to (expectantly) help machine learning practitioners learn and be able to take advantage of important techniques and technologies faster, better, and more intuitively.

      Summaries of my academic, industry, and teaching experience can be found [**here**](https://kaopanboonyuen.github.io/files/panboonyuen_cv.pdf), as well as a small collection of [**my music**](https://soundcloud.com/kaopanboonyuen). Further, I am a self-motivated, independent researcher with six years of deep learning and machine learning experience.

      Thai name: ธีรพงศ์ ปานบุญยืน (เก้า)

      - my publication **(Google Scholar)**: [**this link**](https://scholar.google.co.th/citations?user=myy0qDgAAAAJ&hl=en)

      - my publication **(DBLP)**: [**this link**](https://dblp.org/pers/hd/p/Panboonyuen:Teerapong)

      - my **Web of Science** ResearcherID: [**AAO-4985-2020**](https://publons.com/researcher/AAO-4985-2020/)

      - my curriculum vitae **(CV)**: [**this link**](https://kaopanboonyuen.github.io/files/panboonyuen_cv.pdf)

      - my **ORCID**: [**this link**](https://orcid.org/0000-0001-8464-4476)

      - my research gate **(RG)**: [**this link**](https://www.researchgate.net/profile/Teerapong_Panboonyuen)

      - my paperswithcode: [**this link**](https://paperswithcode.com/author/teerapong-panboonyuen)

      Additionally, you all guys could reach me through [**teerapong.pa@chula.ac.th**](window.open('mailto:teerapong.pa@chula.ac.th');).

