career-profile:
    title: Career Profile
    summary: |
      Hi there. My name is Teerapong Panboonyuen, also known as Kao Panboonyuen (or just Kao), and I’m currently a Ph.D. candidate, a second year Ph.D. in Computer Engineering (Artificial Intelligence, Machine Learning, Deep Learning) at Chulalongkorn University (Bangkok, Thailand).

      In 2015, I graduated with a B.Eng. degree in Computer Engineering from KMUTNB.

      In 2016, I graduated a M.Eng. in Computer Engineering from Chulalongkorn University.

      In 2019, I'll be graduated a Ph.D. in Computer Engineering from here as well, hopefully.

      My primary interests are in practical deep learning and computer vision (especially on remote sensing corpus). I’ll be distilling my own learnings to (expectantly) help machine learning practitioners learn and be able to take advantage of important techniques and technologies faster, better, and more intuitively.

      if you’re interested in me more, please contact me via teerapong.panboonyuen (at) gmail (dot) com

      name in Thai: ธีรพงศ์ ปานบุญยืน
            
      - my cv: http://bit.ly/kao_cv

      - my publication (DBLP): https://dblp.org/pers/hd/p/Panboonyuen:Teerapong

      - my publication (Google Scholar): https://scholar.google.co.th/citations?user=myy0qDgAAAAJ&hl=en

      - my research gate: https://www.researchgate.net/profile/Teerapong_Panboonyuen

