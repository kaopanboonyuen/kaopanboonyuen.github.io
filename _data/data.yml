projects:
    title: Projects
    intro: >
      You can find my project via https://github.com/kaopanboonyuen
    assignments:
      - title: Transportation Mobility Factor Extraction Using Image Recognition Techniques
        link: "https://github.com/kaopanboonyuen/TransportationMobilityFactorExtraction"
        tagline: "We propose a method that automatically extract mobility indicators using two image recognition techniques: Semantic Segmentation and Object Recognition."

      - title: Semantic Labeling on Remote Sensing Corpora using Deep Learning
        link: "https://github.com/kaopanboonyuen/SemanticLabelingOnRemoteSensingCorpora"
        tagline: "We present a novel global convolutional network for segmenting multi-objects from aerial and satellite images."

      - title: Flood Risk Assessment in Ayutthaya Province
        link: "https://github.com/kaopanboonyuen/Rainfall-Prediction-A-Machine-Learning-Approach"
        tagline: "We described a more efficient method to create flood susceptibility map - using Thailand’s Ayutthaya Province as a case study to assess flood prone areas."

