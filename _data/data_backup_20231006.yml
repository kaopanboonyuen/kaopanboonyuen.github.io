projects:
    title: Projects, Teaching, Featured Talks, and Research Communities
    intro: >
      You can find my projects through https://github.com/kaopanboonyuen
    assignments:

      - title: Object Detection of Road Assets Using Transformer-Based YOLOX with Feature Pyramid Decoder on Thai Highway Panorama (Project)
        link: "https://www.mdpi.com/2078-2489/13/1/5"
        tagline: "Identifying road asset objects in Thailand highway monitoring image sequences is essential for intelligent traffic monitoring and administration of the highway. We introduce transformer-based Feature Pyramid Network (FPN) decoder designs, injecting the FPN style of decoder design into Transformer-based YOLOX reasoning."

      - title: The Bangkok Urbanscapes Dataset for Semantic Urban Scene Understanding Using Deep Learning (Project)
        link: "https://kaopanboonyuen.github.io/bkkurbanscapes"
        tagline: "To further study self-driving cars in Thailand, we provide both the proposed methods and the proposed dataset in this project. We hope that our architecture and our dataset would help self-driving autonomous developers improve systems for driving in many cities with unique traffic and driving conditions similar to Bangkok and elsewhere in Thailand."

      - title: Geospatial Big Data Analytics 2022 (Teaching)
        link: "https://github.com/kaopanboonyuen/kaopanboonyuen.github.io/raw/master/files/talks/panboonyuen_Geospatial_Big_Data_Analytics_2022.jpeg"
        tagline: "Demonstrate an understanding of the breadth of methods and techniques available for handling large volumes of geospatial data; use AI/ML methods with PySpark and techniques to conduct spatial analyses of big data and apply resulting analyses to problems within the student’s own discipline."

      - title: Geospatial Big Data Analytics 2023 (Teaching)
        link: "https://github.com/kaopanboonyuen/kaopanboonyuen.github.io/raw/master/files/talks/panboonyuen_Geospatial_Big_Data_Analytics_2023.jpg"
        tagline: "Extract data using web scraping with python, Visualizations using Looker Studio of Google, and PySpark for Machine Learning"

      - title: Achieve Data Science First Meet (Featured Talks, and Research Communities)
        link: "https://github.com/kaopanboonyuen/kaopanboonyuen.github.io/raw/master/files/talks/panboonyuen_data_science_talk.jpeg"
        tagline: "More and more companies realize the importance of data science, AI, and machine learning. Regardless of industry or size, organizations that wish to remain competitive in the age of big data ought to efficiently originate and implement data science capabilities or risk being left behind."

      - title: Transportation Mobility Factor Extraction Using Image Recognition Techniques (Project)
        link: "https://github.com/kaopanboonyuen/TransportationMobilityFactorExtraction"
        tagline: "We propose a method that automatically extract mobility indicators using two image recognition techniques: Semantic Segmentation and Object Recognition."

      - title: Semantic Labeling on Remote Sensing Corpora using Deep Learning (Project)
        link: "https://github.com/kaopanboonyuen/SemanticLabelingOnRemoteSensingCorpora"
        tagline: "We present a novel global convolutional network for segmenting multi-objects from aerial and satellite images."

      - title: Flood Risk Assessment in Ayutthaya Province (Project)
        link: "https://github.com/kaopanboonyuen/Rainfall-Prediction-A-Machine-Learning-Approach"
        tagline: "We described a more efficient method to create flood susceptibility map - using Thailand’s Ayutthaya Province as a case study to assess flood prone areas."

